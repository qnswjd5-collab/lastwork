<!DOCTYPE html>
<html lang="ko">
<head>

    <title>말랑 마켓 | 귀여운 스퀴시 쇼핑몰</title>
    <link rel="stylesheet" href="mallang.css">

<body>

    <header>
        <div class="logo">🪐 말랑 마켓</div>
        <nav>
            <ul class="menu-list">
                <li><a href="#animal">동물 말랑이</a></li>

                <li><a href="#etc">이색 말랑이</a></li>

        </nav>
    </header>

    <section class="main-banner">
        <h2>말랑말랑 정품 스퀴시 모음전</h2>
        <p>일상의 스트레스를 부드럽고 말랑한 스퀴시로!</p>
    </section>

    <main>

                </div>
                <div class="product-card">

                    <p class="price">4,200원</p>
